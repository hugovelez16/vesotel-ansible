- name: Configurar LXC Gateway (Caddy & Tinyproxy)
  hosts: gateway
  tasks:
    - name: Actualizar repositorios e instalar Caddy y Tinyproxy
      apt:
        name: [ 'caddy', 'curl', 'tinyproxy' ]
        state: present
        update_cache: yes

    - name: Permitir conexiones desde subred de apps en Tinyproxy
      lineinfile:
        path: /etc/tinyproxy/tinyproxy.conf
        line: "Allow 10.110.110.0/24"
      notify: restart tinyproxy

    - name: Permitir conexiones desde subred de datos en Tinyproxy
      lineinfile:
        path: /etc/tinyproxy/tinyproxy.conf
        line: "Allow 10.120.120.0/24"
      notify: restart tinyproxy

  handlers:
    - name: restart tinyproxy
      service:
        name: tinyproxy
        state: restarted

- name: Configurar VM de Producción (Docker Engine & Swarm)
  hosts: apps
  become: true
  tasks:
    - name: Configurar Proxy de APT
      copy:
        dest: /etc/apt/apt.conf.d/80proxy
        content: |
          Acquire::http::Proxy "http://10.110.110.2:8888";
          Acquire::https::Proxy "http://10.110.110.2:8888";

    - name: Instalar paquetes prerrequisito
      apt:
        name: [ 'apt-transport-https', 'ca-certificates', 'curl', 'gnupg', 'software-properties-common' ]
        state: present

    - name: Instalar Docker Engine y Docker Compose Plugin
      apt:
        name: [ 'docker-ce', 'docker-ce-cli', 'containerd.io', 'docker-compose-plugin' ]
        state: latest
        update_cache: yes

    - name: Inicializar Docker Swarm
      shell: docker swarm init --advertise-addr 10.110.110.3
      register: swarm_init
      failed_when: false # Evita fallar si Swarm ya estaba inicializado

- name: Configurar LXC Base de Datos (PostgreSQL & Redis)
  hosts: database
  tasks:
    - name: Configurar Proxy de APT
      copy:
        dest: /etc/apt/apt.conf.d/80proxy
        content: |
          Acquire::http::Proxy "http://10.120.120.2:8888";
          Acquire::https::Proxy "http://10.120.120.2:8888";

    - name: Instalar PostgreSQL 16 y Redis Server
      apt:
        name: [ 'postgresql-16', 'redis-server' ]
        state: present
        update_cache: yes

    - name: Configurar listen_addresses en PostgreSQL
      lineinfile:
        path: /etc/postgresql/16/main/postgresql.conf
        regexp: "^#?listen_addresses\\s*="
        line: "listen_addresses = '*'"
      notify: restart postgresql

    - name: Permitir conexiones desde la subred privada de datos en pg_hba.conf
      lineinfile:
        path: /etc/postgresql/16/main/pg_hba.conf
        line: "host    all             all             10.120.120.0/24         md5"
      notify: restart postgresql

    - name: Configurar Redis para escuchar en todas las interfaces
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: "^bind "
        line: "bind 0.0.0.0"
      notify: restart redis

    - name: Desactivar modo protegido en Redis
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: "^protected-mode "
        line: "protected-mode no"
      notify: restart redis

    - name: Asegurar que los servicios están iniciados
      meta: flush_handlers

    - name: Establecer contraseña del usuario postgres
      become: true
      become_user: postgres
      shell: psql -c "ALTER USER postgres WITH PASSWORD 'Granada2020';"

  handlers:
    - name: restart postgresql
      service:
        name: postgresql
        state: restarted

    - name: restart redis
      service:
        name: redis-server
        state: restarted

- name: Configurar LXC Storage (MinIO)
  hosts: storage
  tasks:
    - name: Configurar Proxy de APT
      copy:
        dest: /etc/apt/apt.conf.d/80proxy
        content: |
          Acquire::http::Proxy "http://10.110.110.2:8888";
          Acquire::https::Proxy "http://10.110.110.2:8888";

    - name: Descargar instalador de MinIO
      get_url:
        url: https://dl.min.dev/server/minio/release/linux-amd64/archive/minio_20240611022718.0.0_amd64.deb
        dest: /tmp/minio.deb
      environment:
        http_proxy: http://10.110.110.2:8888
        https_proxy: http://10.110.110.2:8888

    - name: Instalar MinIO deb
      apt:
        deb: /tmp/minio.deb
